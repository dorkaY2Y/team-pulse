# netlify.toml – Team Pulse

[build]
  publish = "."
  functions = "netlify/functions"
  command = "node build-config.js && cd worldskills-app && npm install --legacy-peer-deps && npx expo export --platform web && cp -r dist ../ws"

# WorldSkills app SPA routing
[[redirects]]
  from = "/ws"
  to = "/ws/index.html"
  status = 200

[[redirects]]
  from = "/ws/*"
  to = "/ws/index.html"
  status = 200

# Redirect /survey → /survey.html (clean URLs)
[[redirects]]
  from = "/survey"
  to   = "/survey.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to   = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
