# netlify.toml – Team Pulse v2

[build]
  publish = "."
  functions = "netlify/functions"
  command = "node build-config.js"

# Clean URLs
[[redirects]]
  from = "/survey"
  to   = "/survey.html"
  status = 200

[[redirects]]
  from = "/report"
  to   = "/report.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to   = "/thank-you.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
