# netlify.toml – Team Pulse

[build]
  publish = "."
  functions = "netlify/functions"
  command = "node build-config.js"

# Redirect /survey → /survey.html (clean URLs)
[[redirects]]
  from = "/ws"
  to = "/worldskills-web/index.html"
  status = 200

[[redirects]]
  from = "/ws/*"
  to = "/worldskills-web/index.html"
  status = 200

[[redirects]]
  from = "/survey"
  to   = "/survey.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to   = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
